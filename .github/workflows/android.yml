name: Build NetMesh Android APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'netmesh-android/**'
      - '.github/workflows/android.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'netmesh-android/**'
  workflow_dispatch:

jobs:

  # ── Job 1: Debug APK — no signing needed, runs immediately ───────────────
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      # Fix executable bit — both chmod (runtime) and git index (repo)
      - name: Make gradlew executable
        working-directory: netmesh-android
        run: |
          chmod +x gradlew
          git update-index --chmod=+x gradlew || true

      # Use 'sh gradlew' — works even if the shebang line has Windows line endings
      - name: Build debug APK
        working-directory: netmesh-android
        run: sh gradlew assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: NetMesh-debug-${{ github.run_number }}
          path: netmesh-android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30


  # ── Job 2: Signed release APK — requires GitHub Secrets ─────────────────
  #
  #  Add these four secrets in: Settings → Secrets → Actions
  #    KEYSTORE_BASE64      base64-encoded .jks keystore file
  #    KEYSTORE_PASSWORD    keystore password
  #    KEY_ALIAS            key alias (e.g. netmesh-key)
  #    KEY_PASSWORD         key password
  #
  build-release:
    name: Build Signed Release APK
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Make gradlew executable
        working-directory: netmesh-android
        run: |
          chmod +x gradlew
          git update-index --chmod=+x gradlew || true

      - name: Decode keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        working-directory: netmesh-android
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/netmesh-release.jks

      - name: Build signed release APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        working-directory: netmesh-android
        env:
          SIGNING_STORE_FILE: app/netmesh-release.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: sh gradlew assembleRelease --stacktrace

      - name: Build unsigned release APK (no secrets configured)
        if: ${{ secrets.KEYSTORE_BASE64 == '' }}
        working-directory: netmesh-android
        run: |
          echo "No signing secrets found — building unsigned release for compile check only."
          sh gradlew assembleRelease --stacktrace || true

      - name: Upload signed release APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: NetMesh-release-signed-${{ github.run_number }}
          path: netmesh-android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      # Always clean up the keystore — never leave credentials on the runner
      - name: Clean up keystore
        if: always()
        working-directory: netmesh-android
        run: rm -f app/netmesh-release.jks
