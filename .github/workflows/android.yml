name: Android Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with System Gradle
        run: |
          cd netmesh-android
          # हम यहाँ किसी भी wrapper फाइल पर निर्भर नहीं रहेंगे
          # सीधे 'gradle' कमांड का इस्तेमाल करेंगे
          gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: netmesh-android/app/build/outputs/apk/debug/*.apk
