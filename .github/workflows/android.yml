name: Android Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Fixed Gradle
        run: |
          cd netmesh-android
          # हम यहाँ किसी भी सिस्टम ग्रैडल का इस्तेमाल नहीं करेंगे
          # हम Wrapper को वर्जन 7.5 पर सेट करेंगे (जो पुराने प्रोजेक्ट्स के लिए बेस्ट है)
          ./gradlew wrapper --gradle-version 7.5
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: netmesh-android/app/build/outputs/apk/debug/*.apk
