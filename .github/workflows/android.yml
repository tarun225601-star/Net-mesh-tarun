name: Android Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Fix Gradle Version and Build
        run: |
          cd netmesh-android
          # ग्रेडले को वर्जन 8.0 पर सेट करना
          ./gradlew wrapper --gradle-version 8.0
          # परमिशन देना
          chmod +x gradlew
          # ऐप का बिल्ड बनाना
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: app-debug
          path: netmesh-android/app/build/outputs/apk/debug/*.apk
