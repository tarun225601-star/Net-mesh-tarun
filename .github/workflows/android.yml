name: Android Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Fixed Gradle
        run: |
          cd netmesh-android
          # सबसे पहले फाइल की परमिशन को पूरी तरह खोलें
          chmod 777 gradlew
          # अब ग्रैडल वर्जन अपडेट करें
          ./gradlew wrapper --gradle-version 7.5
          # अब बिल्ड चलाएं
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: netmesh-android/app/build/outputs/apk/debug/*.apk
