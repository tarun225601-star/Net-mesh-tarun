name: Android Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with System Gradle
        run: |
          # हम wrapper को छोड़ रहे हैं, सीधे सिस्टम ग्रैडल का उपयोग कर रहे हैं
          cd netmesh-android
          gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: netmesh-android/app/build/outputs/apk/debug/*.apk
