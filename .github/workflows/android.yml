name: Android Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Project Wrapper
        run: |
          cd netmesh-android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: List APK output (debug)
        if: always()
        run: find netmesh-android/app/build/outputs/apk -name "*.apk" 2>/dev/null || echo "No APK files found"

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: netmesh-android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 7
