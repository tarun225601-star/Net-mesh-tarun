workflows:
  android-build:
    name: Android Build
    environment:
      java: 17
    scripts:
      - name: Build APK
        script: |
          # पहले gradlew वाली सही जगह ढूंढें और परमिशन दें
          cd netmesh-android
          chmod +x gradlew
          # अब बिल्ड चलाएं
          ./gradlew assembleDebug --no-daemon
    artifacts:
      - netmesh-android/app/build/outputs/apk/debug/*.apk
